name: Push Docker Images to ECR Public

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - registry: docker.io/library
            image: node
            tag: 20.15.0-alpine
          - registry: docker.io/library
            image: node
            tag: 20-slim
          - registry: docker.io/library
            image: postgres
            tag: 15-alpine
          - registry: docker.io
            image: ashraf1abdelrasool/saas-gateway
            tag: sha-8eed986
          - registry: docker.io
            image: otel/opentelemetry-collector-contrib
            tag: 0.139.0
          - registry: docker.io
            image: openzipkin/zipkin
            tag: 3
          - registry: gcr.io/distroless
            image: nodejs20
            tag: latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Create ECR Public Repository (if not exists)
        run: |
          aws ecr-public create-repository --repository-name ${{ matrix.image }} --region us-east-1 || true

      - name: Get ECR Public registry alias
        id: get-alias
        run: |
          REGISTRY=$(aws ecr-public describe-registries --region us-east-1 --query 'registries[0].registryId' --output text)
          echo "alias=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Pull image
        run: docker pull ${{ matrix.registry }}/${{ matrix.image }}:${{ matrix.tag }}

      - name: Tag image
        run: docker tag ${{ matrix.registry }}/${{ matrix.image }}:${{ matrix.tag }} public.ecr.aws/${{ steps.get-alias.outputs.alias }}/${{ matrix.image }}:${{ matrix.tag }}

      - name: Push image
        run: docker push public.ecr.aws/${{ steps.get-alias.outputs.alias }}/${{ matrix.image }}:${{ matrix.tag }}
