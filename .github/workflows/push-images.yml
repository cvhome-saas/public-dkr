name: Push Docker Images to ECR Public

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: node
            tag: 20.15.0-alpine
          - image: postgres
            tag: 15-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Create ECR Public Repository (if not exists)
        run: |
          aws ecr-public create-repository --repository-name ${{ matrix.image }} --region us-east-1 || true

      - name: Pull image
        run: docker pull docker.io/library/${{ matrix.image }}:${{ matrix.tag }}

      - name: Tag image
        run: docker tag docker.io/library/${{ matrix.image }}:${{ matrix.tag }} public.ecr.aws/cvhome-saas/${{ matrix.image }}:${{ matrix.tag }}

      - name: Push image
        run: docker push public.ecr.aws/YOUR_REGISTRY_ALIAS/${{ matrix.image }}:${{ matrix.tag }}
